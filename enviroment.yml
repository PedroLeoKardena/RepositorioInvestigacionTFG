name: env_audio
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - lightgbm
  - python=3.10
  - pip
  - ffmpeg
  - pytorch
  - torchaudio
  - pytorch-cuda=12.1 
  - pip:
      # Librerías de procesamiento clásico
      - librosa
      - pydub
      - soundfile
      - noisereduce
      - deepfilternet
      - pyannote.audio==3.1.1
      - ipykernel
      - seaborn
      - transformers
      - datasets
      - accelerate>=1.1.0
      - iterative-stratification
